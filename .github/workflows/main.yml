name: Build Fabric Mod

on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Generate Gradle wrapper (if missing)
        run: |
          if [ ! -f "./gradlew" ]; then
            sudo apt-get update -y
            sudo apt-get install -y unzip
            curl -sSL -o gradle.zip https://services.gradle.org/distributions/gradle-9.5.0-bin.zip
            unzip -q gradle.zip
            ./gradle-9.5.0/bin/gradle wrapper --gradle-version 9.5.0
            rm -rf gradle.zip gradle-9.5.0
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle (Fabric Loom)
        run: ./gradlew build --stacktrace

      - name: Upload built mod jar
        uses: actions/upload-artifact@v4
        with:
          name: easy-netherite-op-emerald-pick-fabric-jar
          path: build/libs/*.jar
          if-no-files-found: error
